<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Leonardise</title>
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/login.css">
</head>
<body>
  <div id="site-header"></div>
  <main class="auth-page">
    <h1 class="auth-title">Login</h1>
    <p class="auth-subtitle">Accede a tu cuenta Leonardise para explorar drops, talles y compras premium.</p>
    <form id="login-form" class="form-card">
      <div class="field"><label>Email</label><input name="email" type="email" required autocomplete="email"></div>
      <div class="field"><label>Password</label><input name="password" type="password" required autocomplete="current-password"></div>
      <button class="btn btn-primary full-btn" type="submit">Ingresar</button>
      <div id="login-message" class="message"></div>
      <div class="auth-switch">¿No tienes cuenta? <a href="register.html">Crear cuenta</a></div>
    </form>
  </main>
  <div id="site-footer"></div>
  <script src="assets/js/global.js"></script>
  <script src="assets/js/login.js"></script>
</body>
</html>
