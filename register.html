<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Leonardise</title>
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/register.css">
</head>
<body>
  <div id="site-header"></div>
  <main class="auth-page">
    <h1 class="auth-title">Register</h1>
    <p class="auth-subtitle">Crea tu cuenta para guardar preferencias, talles y futuros lanzamientos.</p>
    <form id="register-form" class="form-card">
      <div class="field"><label>Nombre</label><input name="name" type="text" required autocomplete="name"></div>
      <div class="field"><label>Email</label><input name="email" type="email" required autocomplete="email"></div>
      <div class="field"><label>Password</label><input name="password" type="password" minlength="6" required autocomplete="new-password"></div>
      <button class="btn btn-primary full-btn" type="submit">Crear cuenta</button>
      <div id="register-message" class="message"></div>
      <div class="auth-switch">¿Ya tienes cuenta? <a href="login.html">Ingresar</a></div>
    </form>
  </main>
  <div id="site-footer"></div>
  <script src="assets/js/global.js"></script>
  <script src="assets/js/register.js"></script>
</body>
</html>
